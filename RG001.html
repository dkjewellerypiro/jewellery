<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>RG004 | DK Jewellery</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="showcase.css">

</head>

<body>

<div class="background-glow"></div>

<header class="topbar">

    <div class="brand">

        DK Jewellery

    </div>

</header>

<main class="container">

    <!-- HERO -->

    <section class="hero">

        <div class="image-wrapper">

            <div class="image-slider" id="imageSlider">

<div class="gallery-slide">
<img
src="https://drive.google.com/thumbnail?id=1t7VXmL8eA-NnvX9KkQNxCEACw6tY3Rmq&sz=w1000"
class="product-image"
loading="lazy"
alt="ring">
</div>

<div class="gallery-slide">
<img
src="https://drive.google.com/thumbnail?id=1seouRx2saYmOYQUJ6ouWnojvta02cnJo&sz=w1000"
class="product-image"
loading="lazy"
alt="ring">
</div>

<div class="gallery-slide">
<img
src="https://drive.google.com/thumbnail?id=1KVA7zGG8fEoHQVHh_YYNp3cem-TVAqkp&sz=w1000"
class="product-image"
loading="lazy"
alt="ring">
</div>

<div class="gallery-slide">
<img
src="https://drive.google.com/thumbnail?id=1KVyoKexbpsJGE4kNPEtW9UbUcDfMIT7p&sz=w1000"
class="product-image"
loading="lazy"
alt="ring">
</div>

</div>

        </div>

        <div class="dots">

    <span class="dot active" data-index="0"></span>
    <span class="dot" data-index="1"></span>
    <span class="dot" data-index="2"></span>
    <span class="dot" data-index="3"></span>

</div>

        
            <div class="thumbnail-row">

<img class="thumb active"
src="https://drive.google.com/thumbnail?id=1t7VXmL8eA-NnvX9KkQNxCEACw6tY3Rmq&sz=w1000"
data-index="0">

<img class="thumb"
src="https://drive.google.com/thumbnail?id=1seouRx2saYmOYQUJ6ouWnojvta02cnJo&sz=w1000"
data-index="1">

<img class="thumb"
src="https://drive.google.com/thumbnail?id=1KVA7zGG8fEoHQVHh_YYNp3cem-TVAqkp&sz=w1000"
data-index="2">

<img class="thumb"
src="https://drive.google.com/thumbnail?id=1KVyoKexbpsJGE4kNPEtW9UbUcDfMIT7p&sz=w1000"
data-index="3">

</div>

    </section>

    <!-- PRODUCT TITLE -->

    <section class="product-header">

        <h1>

            ring

        </h1>

    </section>

    <!-- SPECIFICATIONS -->

    <section class="spec-card">

        <div class="spec-row">

            <span>

                Hallmark

            </span>

            <strong>

                91.6

            </strong>

        </div>

        <div class="divider"></div>

        <div class="spec-row">

            <span>

                Net Weight

            </span>

            <strong>

                4.830 g

            </strong>

        </div>

    </section>

    <!-- PRICE -->

    <section class="price-section">

        <p class="price-title">

            Estimated Price

        </p>

        <h2 class="price">

            ₹165,000

        </h2>

        <p class="gst">

            Exclusive of GST

        </p>

    </section>
    <!-- FOOTER -->

    <section class="footer-note">

        <p>

            Every DK Jewellery creation is crafted with precision,
            elegance and BIS hallmarked purity.

        </p>

    </section>

</main>

<!-- FULLSCREEN VIEWER -->

<div id="imageViewer" class="image-viewer">

    <button
        class="close-viewer"
        id="closeViewer"
        type="button"
        aria-label="Close image viewer">

        ×

    </button>

    <button
        class="nav-btn prev"
        id="prevImage"
        type="button"
        aria-label="Previous image">

        &#10094;

    </button>

    <img
        id="viewerImage"
        src=""
        alt="Product Image">

    <button
        class="nav-btn next"
        id="nextImage"
        type="button"
        aria-label="Next image">

        &#10095;

    </button>

    <div
        class="viewer-counter"
        id="viewerCounter">

        1 / 4

    </div>

</div>

<script src="showcase.js"></script>

</body>

</html>
